<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../images/SE1128.png" />
    <title>Course Submission - PESU</title>
    <link rel="stylesheet" href="form.css" />
    <script src="form.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Course Submission</h1>
        <p class="subtitle">Fill in the course details below. Course code auto-fills semester, department, and credits.</p>

        <form id="course-form">
          <fieldset>
            <legend>Faculty</legend>

            <label for="faculty_email">Email</label>
            <input type="email" id="faculty_email" name="faculty_email" required placeholder="admin@pesu.edu.in" />
          </fieldset>

          <fieldset>
            <legend>Course</legend>

            <label for="course_code">Course Code <span class="hint">(e.g. UE25CS242B)</span></label>
            <input type="text" id="course_code" name="course_code" required placeholder="UE25CS242B" />
            <div id="code-preview" class="code-preview hidden"></div>

            <label for="course_title">Course Title</label>
            <input type="text" id="course_title" name="course_title" required placeholder="Operating Systems" />

            <label for="raw_course_content">Course Content</label>
            <textarea id="raw_course_content" name="raw_course_content" rows="8" required placeholder="Unit 1: ...&#10;Unit 2: ..."></textarea>
            <span class="hint">Topics, units, or rough syllabus.</span>

            <label for="text_books">Textbook References</label>
            <textarea id="text_books" name="text_books" rows="4" required></textarea>

            <label for="reference_books">Other Suggested Reference Books <span class="optional">(optional)</span></label>
            <textarea id="reference_books" name="reference_books" rows="4"></textarea>

            <label for="preferred_tools">Preferred Tools / Languages <span class="optional">(optional)</span></label>
            <textarea id="preferred_tools" name="preferred_tools" rows="3"></textarea>
          </fieldset>

          <button type="submit" id="submit-btn">Submit Course</button>
          <a class="form-link" href="../courses/">Manage Courses</a>
          <a class="form-link" href="../preview/">View Preview</a>
        </form>

        <div id="result" class="hidden"></div>
      </div>
    </div>
    <script src="/shared/auth-guard.js"></script>
  </body>
</html>
