<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Curriculum Preview</title>
<style>
  body { margin: 0; background: #e0e0e0; font-family: Calibri, sans-serif; }
  #viewer { max-width: 800px; margin: 0 auto; background: #fff; min-height: 100vh; }
</style>
</head>
<body>
<div id="viewer"></div>
<script>
const sem = new URLSearchParams(location.search).get("sem") || "1";

fetch(`/api/preview/semester/${sem}/courses`)
  .then(r => r.json())
  .then(({ course_ids }) => {
    Promise.all(course_ids.map(id =>
      fetch(`/api/preview/course/${id}`).then(r => r.text())
    )).then(pages => {
      document.getElementById("viewer").innerHTML = pages.join("");
    });
  });
</script>
</body>
</html>
