<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../images/SE1128.png" />
    <title>Curriculum Versions</title>
    <link rel="stylesheet" href="versions.css" />
    <script src="/shared/auth-guard.js"></script>
    <script src="versions.js" defer></script>
  </head>
  <body>
    <header class="toolbar">
      <button id="mobile-menu" type="button" class="icon-btn mobile-only" title="Toggle version list">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="toolbar-title">Version History</span>
      <span class="status-line" id="status" role="status" hidden></span>
      <div class="toolbar-actions">
        <button id="collapse-all" type="button" class="icon-btn" title="Collapse all groups">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
        <button id="expand-all" type="button" class="icon-btn" title="Expand all groups">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar" id="sidebar" aria-label="Version history">
        <div id="version-list" class="version-list"></div>
      </aside>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <section class="viewer-pane">
        <div class="viewer-bar">
          <a id="open-editor" class="button-link" href="/live-editor/" hidden>Open in Editor</a>
        </div>
        <div class="viewer-loading" id="viewer-loading" hidden>
          <div class="spinner"></div>
          <span>Loading preview...</span>
        </div>
        <iframe id="viewer" title="Version preview"></iframe>
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted-foreground);margin-bottom:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div>Select a version to preview its diff against the current curriculum.</div>
        </div>
      </section>
    </main>
  </body>
</html>
