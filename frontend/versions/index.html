<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curriculum Versions</title>
    <link rel="stylesheet" href="versions.css" />
    <script src="versions.js" defer></script>
  </head>
  <body>
    <div class="toolbar">
      <select id="version" aria-label="Version"></select>
      <button id="open-editor" type="button">Open in Editor</button>
      <label class="diff-toggle" title="Show changes vs current">
        <input id="diff-mode" type="checkbox" checked />
        <span>Show Diff</span>
      </label>
      <form class="snapshot" id="snapshot-form">
        <input id="version-name" name="name" type="text" placeholder="Snapshot label" required />
        <button class="primary" type="submit">Save Current Curriculum</button>
      </form>
      <span class="status-line" id="status" role="status"></span>
    </div>
    <iframe id="viewer" title="Version preview"></iframe>
  </body>
</html>
