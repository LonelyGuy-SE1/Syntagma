<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/SE1128.png" />
    <title>PESU Curriculum Automation</title>
    <link rel="stylesheet" href="home/home.css" />
  </head>
  <body>
    <main class="home-shell">
      <section class="home-panel">
        <h1>PESU Curriculum Automation</h1>
        <div class="year-bar">
          <label class="year-label" for="curriculum-year">Academic Year</label>
          <input id="curriculum-year" type="text" inputmode="numeric" placeholder="2025-2026" />
          <button id="save-year" type="button">Save</button>
          <span class="year-status" id="year-status"></span>
        </div>
        <nav class="surface-grid" aria-label="Curriculum surfaces">
          <a class="surface-link" href="form/">Raw Data</a>
          <a class="surface-link" href="courses/">Courses</a>
          <a class="surface-link" href="preview/">Preview</a>
          <a class="surface-link" href="live-editor/">Live Editor</a>
          <a class="surface-link" href="versions/">Versions</a>
        </nav>
      </section>
    </main>
    <script src="/shared/auth-guard.js"></script>
    <script>
      const yearInput = document.getElementById("curriculum-year");
      const saveBtn = document.getElementById("save-year");
      const yearStatus = document.getElementById("year-status");
      yearInput.value = localStorage.getItem("curriculumYear") || "";
      saveBtn.addEventListener("click", () => {
        const val = yearInput.value.trim();
        if (val) localStorage.setItem("curriculumYear", val);
        else localStorage.removeItem("curriculumYear");
        yearStatus.textContent = "Saved";
        setTimeout(() => { yearStatus.textContent = ""; }, 1500);
      });
    </script>
  </body>
</html>
