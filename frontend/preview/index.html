<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../images/SE1128.png" />
    <title>Preview - PESU</title>
    <link rel="stylesheet" href="preview.css" />
    <script src="/shared/auth-guard.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <a href="/" class="home-btn" title="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <select id="semester" aria-label="Semester">
        <option value="all">Overall</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
      </select>
      <select id="course" aria-label="Course" hidden></select>
      <input id="curriculum-year" type="text" inputmode="numeric" aria-label="Academic Year" hidden />
      <a class="button-link" id="open" rel="noreferrer">Open PDF</a>
      <a class="button-link" id="download">Download PDF</a>
      <span class="status-line" id="status" role="status"></span>
    </div>
    <div class="viewer-wrap">
      <div class="loading" id="loading" hidden>
        <div class="spinner"></div>
        <span>Loading curriculum...</span>
      </div>
      <iframe id="viewer" title="Curriculum Preview"></iframe>
    </div>

    <script src="preview.js" defer></script>
  </body>
</html>
