<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../images/SE1128.png" />
    <title>Courses - PESU</title>
    <link rel="stylesheet" href="courses.css" />
    <link rel="stylesheet" href="../shared/dialog.css" />
    <script src="/shared/auth-guard.js"></script>
    <script src="../shared/dialog.js"></script>
    <script src="courses.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <a href="/" class="home-btn" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </a>
          <div>
            <h1>Courses</h1>
            <p>Manage refined courses used by preview, editor, and versions.</p>
          </div>
        </div>
        <div class="actions">
          <a class="button-link" href="../form/">Add Course</a>
          <a class="button-link" href="../live-editor/">Agentic Editor</a>
        </div>
      </header>

      <section class="panel">
        <div class="filters">
          <select id="semester" aria-label="Semester">
            <option value="">All semesters</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
            <option value="7">Semester 7</option>
            <option value="8">Semester 8</option>
          </select>
          <select id="visibility" aria-label="Visibility">
            <option value="">All courses</option>
            <option value="visible">Visible only</option>
            <option value="hidden">Hidden only</option>
          </select>
          <input id="search" type="search" placeholder="Search courses..." aria-label="Search courses" />
          <span class="status-line" id="status" role="status"></span>
        </div>

        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width:80px" />
              <col style="width:130px" />
              <col />
              <col style="width:70px" />
              <col style="width:70px" />
              <col style="width:90px" />
            </colgroup>
            <thead>
              <tr>
                <th>Semester</th>
                <th>Code</th>
                <th>Course</th>
                <th>Credits</th>
                <th>Visible</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="course-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
