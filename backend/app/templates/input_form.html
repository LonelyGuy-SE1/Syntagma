<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Course Submission</title>
  </head>

  <body>
    <h1>Course Submission Form</h1>

    <form method="post" action="/submissions">
      <h2>Faculty Details</h2>

      <label for="faculty_name">Faculty Name</label><br />
      <input
        type="text"
        id="faculty_name"
        name="faculty_name"
        required
      /><br /><br />

      <label for="faculty_email">Faculty Email</label><br />
      <input
        type="email"
        id="faculty_email"
        name="faculty_email"
        required
      /><br /><br />

      <label for="offering_department">Offering Department</label><br />
      <input
        type="text"
        id="offering_department"
        name="offering_department"
        required
      />
      <p>Example: Mathematics, Computer Science, Electronics</p>

      <h2>Target Course Details</h2>

      <label for="target_department">Target Department or Program</label><br />
      <input
        type="text"
        id="target_department"
        name="target_department"
        required
      />
      <p>Example: CSE, AIML, ECE, Mechanical</p>

      <label for="semester">Semester</label><br />
      <input
        type="number"
        id="semester"
        name="semester"
        min="1"
        max="8"
        required
      /><br /><br />

      <label for="course_title">Course Title</label><br />
      <input
        type="text"
        id="course_title"
        name="course_title"
        required
      /><br /><br />

      <label for="credit_category">Credit Category</label><br />
      <select id="credit_category" name="credit_category" required>
        <option value="">Select credit category</option>
        <option value="0">0 Credits</option>
        <option value="2">2 Credits</option>
        <option value="4">4 Credits</option>
        <option value="5">5 Credits</option></select
      ><br /><br />

      <h2>Academic Content</h2>

      <label for="raw_course_content">Course Content</label><br />
      <textarea
        id="raw_course_content"
        name="raw_course_content"
        rows="10"
        cols="90"
        required
      ></textarea>
      <p>Enter the topics, units, or rough syllabus content.</p>

      <label for="text_books">Textbook References</label><br />
      <textarea
        id="text_books"
        name="text_books"
        rows="5"
        cols="90"
        required
      ></textarea
      ><br /><br />

      <label for="reference_books">Reference Books</label><br />
      <textarea
        id="reference_books"
        name="reference_books"
        rows="5"
        cols="90"
      ></textarea
      ><br /><br />

      <label for="preferred_tools">Preferred Tools or Languages</label><br />
      <textarea
        id="preferred_tools"
        name="preferred_tools"
        rows="4"
        cols="90"
      ></textarea
      ><br /><br />

      <button type="submit">Submit Course</button>
    </form>
  </body>
</html>
